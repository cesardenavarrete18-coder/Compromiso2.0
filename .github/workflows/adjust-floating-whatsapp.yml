name: Adjust floating WhatsApp position

on:
  push:
    branches:
      - feature/model-whatsapp-floating-button
    paths:
      - .github/workflows/adjust-floating-whatsapp.yml

permissions:
  contents: write

jobs:
  adjust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/model-whatsapp-floating-button
      - name: Keep mobile CTA clear
        shell: bash
        run: |
          python -c "from pathlib import Path; p=Path('lead-capture.css'); s=p.read_text(encoding='utf-8'); s=s.replace('bottom: max(16px, env(safe-area-inset-bottom));', 'bottom: max(96px, calc(env(safe-area-inset-bottom) + 80px));'); p.write_text(s, encoding='utf-8')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lead-capture.css
          git commit -m "fix: evitar superposición del CTA en mobile"
          git push origin HEAD:feature/model-whatsapp-floating-button
