name: Fix floating WhatsApp syntax

on:
  push:
    branches:
      - feature/model-whatsapp-floating-button
    paths:
      - .github/workflows/apply-floating-whatsapp.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/model-whatsapp-floating-button
      - name: Fix JavaScript template literals
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('lead-capture.js')
          source = path.read_text(encoding='utf-8')
          source = source.replace('\\`', '`').replace('\\${', '${')
          path.write_text(source, encoding='utf-8')
          PY
          node --check lead-capture.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lead-capture.js
          git commit -m "fix: corregir sintaxis de WhatsApp flotante"
          git push origin HEAD:feature/model-whatsapp-floating-button
