name: Fix technical sheet paths

on:
  push:
    branches:
      - feature/fix-technical-sheets-paths
    paths:
      - .github/workflows/fix-technical-sheet-paths.yml
      - volkswagen/**/index.html
      - peugeot/**/index.html
      - fiat/**/index.html

permissions:
  contents: write

jobs:
  update-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/fix-technical-sheets-paths
      - name: Correct technical sheet links
        shell: bash
        run: |
          set -euo pipefail
          files=(
            volkswagen/amarok/index.html
            volkswagen/tera/index.html
            volkswagen/taos/index.html
            volkswagen/nivus/index.html
            volkswagen/tcross/index.html
            peugeot/208/index.html
            peugeot/2008/index.html
            fiat/cronos/index.html
            fiat/titano/index.html
          )
          for file in "${files[@]}"; do
            sed -i 's#../../assets/fichas/#../../assets/#g' "$file"
          done
          sed -i 's#href="../../assets/fichas/fiat-mobi.pdf" download#href="#" hidden aria-hidden="true" tabindex="-1"#g' fiat/mobi/index.html

          if git diff --quiet; then
            echo "No changes required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add volkswagen peugeot fiat
          git commit -m "fix: corregir rutas de fichas técnicas"
          git push origin HEAD:feature/fix-technical-sheets-paths
