name: Refresh lead loader v3

on:
  push:
    branches:
      - feature/lead-capture-modal
    paths:
      - .github/workflows/refresh-lead-loader-v3.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/lead-capture-modal

      - name: Update exact model pages
        run: |
          python - <<'PY'
          from pathlib import Path

          files = [
              'volkswagen/amarok/index.html',
              'volkswagen/tera/index.html',
              'volkswagen/taos/index.html',
              'volkswagen/nivus/index.html',
              'volkswagen/tcross/index.html',
              'peugeot/partner/index.html',
              'peugeot/208/index.html',
              'peugeot/2008/index.html',
              'fiat/cronos/index.html',
              'fiat/titano/index.html',
              'fiat/mobi/index.html',
          ]

          old = 'lead-capture-loader.js?v=20260610-2'
          new = 'lead-capture-loader.js?v=20260610-3'
          for name in files:
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Missing expected loader version in {name}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/refresh-lead-loader-v3.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add volkswagen/amarok/index.html volkswagen/tera/index.html volkswagen/taos/index.html volkswagen/nivus/index.html volkswagen/tcross/index.html peugeot/partner/index.html peugeot/208/index.html peugeot/2008/index.html fiat/cronos/index.html fiat/titano/index.html fiat/mobi/index.html .github/workflows/refresh-lead-loader-v3.yml
          git commit -m "Refresh webhook config across model pages"
          git push origin feature/lead-capture-modal
