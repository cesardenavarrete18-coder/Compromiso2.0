name: Refresh lead loader cache v6

on:
  push:
    branches:
      - feature/lead-capture-modal
    paths:
      - .github/workflows/refresh-lead-loader-v6.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/lead-capture-modal
      - name: Update the 11 model pages
        run: |
          files=(
            volkswagen/amarok/index.html
            volkswagen/tera/index.html
            volkswagen/taos/index.html
            volkswagen/nivus/index.html
            volkswagen/tcross/index.html
            peugeot/partner/index.html
            peugeot/208/index.html
            peugeot/2008/index.html
            fiat/cronos/index.html
            fiat/titano/index.html
            fiat/mobi/index.html
          )
          sed -i 's/lead-capture-loader.js?v=20260610-5/lead-capture-loader.js?v=20260610-6/g' "${files[@]}"
          rm .github/workflows/refresh-lead-loader-v6.yml
      - name: Commit refreshed references
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add volkswagen peugeot fiat .github/workflows/refresh-lead-loader-v6.yml
          git commit -m "Refresh lead modal styles across model pages"
          git push origin HEAD:feature/lead-capture-modal
