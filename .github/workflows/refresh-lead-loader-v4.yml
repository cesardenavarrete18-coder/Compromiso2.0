name: Refresh lead capture loader v4

on:
  push:
    branches:
      - feature/lead-capture-modal
    paths:
      - .github/workflows/refresh-lead-loader-v4.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/lead-capture-modal

      - name: Update loader cache version
        shell: bash
        run: |
          files=(
            volkswagen/amarok/index.html
            volkswagen/tera/index.html
            volkswagen/taos/index.html
            volkswagen/nivus/index.html
            volkswagen/tcross/index.html
            peugeot/partner/index.html
            peugeot/208/index.html
            peugeot/2008/index.html
            fiat/cronos/index.html
            fiat/titano/index.html
            fiat/mobi/index.html
          )
          for file in "${files[@]}"; do
            sed -i 's/lead-capture-loader.js?v=20260610-3/lead-capture-loader.js?v=20260610-4/g' "$file"
          done
          rm .github/workflows/refresh-lead-loader-v4.yml

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add volkswagen/amarok/index.html volkswagen/tera/index.html volkswagen/taos/index.html volkswagen/nivus/index.html volkswagen/tcross/index.html peugeot/partner/index.html peugeot/208/index.html peugeot/2008/index.html fiat/cronos/index.html fiat/titano/index.html fiat/mobi/index.html .github/workflows/refresh-lead-loader-v4.yml
          git commit -m "Refresh lead capture loader cache"
          git push origin feature/lead-capture-modal
